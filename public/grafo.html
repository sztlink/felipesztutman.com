const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene=new THREE.Scene();

const world=new THREE.Group(),nodeGrp=new THREE.Group(),hitGrp=new THREE.Group(),lineGrp=new THREE.Group();
world.add(lineGrp,nodeGrp,hitGrp);

const sp=new Float32Array(1500);
for(let i=0;i<1500;i++)sp[i]=(Math.random()-.5)*(i%3===2?800:1200);
const sGeo=new THREE.BufferGeometry();
sGeo.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({color:0x223344,size:1.3,transparent:true,opacity:.55})));

let stack=[],curG=U;
let rotX=.12,rotY=.18,tRX=.12,tRY=.18;

function am(m,b){m.userData.b=b;mats.push(m);return m;}

function buildMesh(n){
  const g=new THREE.Group();g.userData.nid=n.id;const h=n.hex;
  const isBill=n.cat==='cluster'||n.cat==='obra'||n.cat==='projeto'||n.cat==='modulo';
  if(isBill){
    const w=n.cat==='cluster'?72:n.cat==='obra'?54:40,ht=n.cat==='cluster'?46:n.cat==='obra'?34:26;
    const pl=new THREE.PlaneGeometry(w,ht);
    g.add(new THREE.Mesh(pl,am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.15,side:THREE.DoubleSide}),.15)));
    g.add(new THREE.LineSegments(new THREE.EdgesGeometry(pl),am(new THREE.LineBasicMaterial({color:h,transparent:true,opacity:.75}),.75)));
    const dot=new THREE.Mesh(new THREE.CircleGeometry(2.5,12),am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:1}),1));
    dot.position.z=.1;g.add(dot);
    bills.push(g);
  }else if(n.cat==='sistema'){
    const bx=new THREE.BoxGeometry(28,28,28);
    g.add(new THREE.Mesh(bx,am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.08}),.08)));
    g.add(new THREE.LineSegments(new THREE.EdgesGeometry(bx),am(new THREE.LineBasicMaterial({color:h,transparent:true,opacity:.88}),.88)));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(10,10,10),am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.4}),.4)));
  }else if(n.cat==='conceito'){
    g.add(new THREE.Mesh(new THREE.SphereGeometry(16,14,10),am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.11,wireframe:true}),.11)));
    g.add(new THREE.Mesh(new THREE.SphereGeometry(4,8,8),am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:1}),1)));
  }else if(n.cat==='agente'){
    const oc=new THREE.OctahedronGeometry(16,0);
    g.add(new THREE.Mesh(oc,am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.14}),.14)));
    g.add(new THREE.LineSegments(new THREE.EdgesGeometry(oc),am(new THREE.LineBasicMaterial({color:h,transparent:true,opacity:.85}),.85)));
  }else if(n.cat==='pessoa'){
    const cyl=new THREE.CylinderGeometry(14,14,3.5,18);
    g.add(new THREE.Mesh(cyl,am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.18}),.18)));
    const dc=new THREE.Mesh(new THREE.CircleGeometry(6,12),am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:1}),1));
    dc.rotation.x=-Math.PI/2;dc.position.y=2;g.add(dc);
  }else{
    const bx=new THREE.BoxGeometry(15,15,15);
    g.add(new THREE.Mesh(bx,am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.15}),.15)));
    g.add(new THREE.LineSegments(new THREE.EdgesGeometry(bx),am(new THREE.LineBasicMaterial({color:h,transparent:true,opacity:.85}),.85)));
  }
  if(n.children){
    const r=n.cat==='sistema'?23:isBill?(n.cat==='cluster'?36:27):20;
    const tor=new THREE.Mesh(new THREE.TorusGeometry(r,.85,8,34),am(new THREE.MeshBasicMaterial({color:h,transparent:true,opacity:.35}),.35));
    g.add(tor);rings.push(tor);
  }
  g.position.set(n.x,n.y,n.z);return g;
}

function buildGraph(g){
  while(nodeGrp.children.length)nodeGrp.remove(nodeGrp.children[0]);
  while(hitGrp.children.length)hitGrp.remove(hitGrp.children[0]);
  while(lineGrp.children.length)lineGrp.remove(lineGrp.children[0]);
  mats=[];bills=[];rings=[];hitboxes=[];
  if(!g.nodes)return;
  g.nodes.forEach(n=>{
    nodeGrp.add(buildMesh(n));
    const hb=new THREE.Mesh(new THREE.SphereGeometry(30,5,3),new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false}));
    hb.position.set(n.x,n.y,n.z);hb.userData.nid=n.id;hitGrp.add(hb);hitboxes.push(hb);
  });
  const drawn=new Set();
  g.nodes.forEach(n=>(n.links||[]).forEach(tid=>{
    const k=[n.id,tid].sort().join('|');
    if(!drawn.has(k)){drawn.add(k);
      const tn=g.nodes.find(x=>x.id===tid);
      if(tn){
        const lm=new THREE.LineBasicMaterial({color:0x1a3055,transparent:true,opacity:.42});
        lm.userData.b=.42;mats.push(lm);
        lineGrp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(n.x,n.y,n.z),new THREE.Vector3(tn.x,tn.y,tn.z)]),lm));
      }
    }
  }));
}

function fitZoom(nodes){
  if(!nodes||!nodes.length)return;
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const sp=Math.max(Math.max(...xs)-Math.min(...xs),Math.max(...ys)-Math.min(...ys));
  tZoom=Math.max(180,Math.min(580,sp*1.45+110));
}

function enterNode(n){
  if(!n||!n.children)return;
  closePanel();tAl=0;
  setTimeout(()=>{
    stack.push({graph:curG,rX:tRX,rY:tRY,pZ:tZoom});
    curG=n.children;buildGraph(curG);
    tRX=.12;tRY=.2;rotX=.12;rotY=.2;world.rotation.set(rotX,rotY,0);
    fitZoom(curG.nodes);zoom=tZoom;tAl=1;updateChrome();
  },300);
}

function goToDepth(d){
  if(stack.length<=d)return;
  closePanel();tAl=0;
  setTimeout(()=>{
    let saved;
    while(stack.length>d)saved=stack.pop();
    curG=saved.graph;buildGraph(curG);
    tRX=saved.rX;tRY=saved.rY;rotX=saved.rX;rotY=saved.rY;
    world.rotation.set(rotX,rotY,0);
    tZoom=saved.pZ||340;zoom=tZoom;tAl=1;updateChrome();
  },300);
}

function goBack(){goToDepth(stack.length-1);}

function updateChrome(){
  bcEl.innerHTML='';
  const path=[{label:'felipesztutman.com'}];
  stack.forEach(s=>{if(s.graph&&s.graph.label)path.push({label:s.graph.label});});
  if(curG.label)path.push({label:curG.label,active:true});
  path.forEach((seg,i)=>{
    if(i){const sp=document.createElement('span');sp.className='bx';sp.textContent='/';bcEl.appendChild(sp);}
    const el=document.createElement('span');el.textContent=seg.label;
    if(seg.active)el.className='bl';
    else{el.className='bs';el.onclick=()=>goToDepth(i);}
    bcEl.appendChild(el);
  });
  bk.style.display=stack.length?'block':'none';
  ctl.style.background=curG.cc||'transparent';
  ctl.style.opacity=curG.cc?.85:0;
}

function openPanel(n){
  selN=n;
  const pb=document.getElementById('pb');
  pb.textContent=n.cat;pb.style.color=n.lc;pb.style.borderColor=n.lc+'30';
  document.getElementById('pt').textContent=n.label;
  document.getElementById('pd').textContent=n.desc||'';
  const pe=document.getElementById('pe');pe.style.display=n.children?'block':'none';
  const pl=document.getElementById('pl'),plh=document.getElementById('plh');
  pl.innerHTML='';
  const conns=(n.links||[]).map(id=>curG.nodes.find(x=>x.id===id)).filter(Boolean);
  plh.style.display=conns.length?'block':'none';
  conns.forEach(cn=>{
    const li=document.createElement('li');
    const dot=document.createElement('span');
    dot.style.cssText=`display:inline-block;width:6px;height:6px;border-radius:50%;background:${cn.lc};flex-shrink:0`;
    li.appendChild(dot);li.appendChild(document.createTextNode(cn.label));
    li.onclick=()=>openPanel(cn);pl.appendChild(li);
  });
  pn.style.width='240px';
}

function closePanel(){selN=null;pn.style.width='0';}
function enterSelected(){if(selN&&selN.children)enterNode(selN);}

wr.addEventListener('mousedown',e=>{isDrag=true;dmx=e.clientX;dmy=e.clientY;rx0=tRX;ry0=tRY;dist=0;});
window.addEventListener('mouseup',()=>{isDrag=false;});
window.addEventListener('mousemove',e=>{
  if(isDrag){dist+=Math.hypot(e.clientX-dmx,e.clientY-dmy);tRY=ry0+(e.clientX-dmx)*.005;tRX=rx0+(e.clientY-dmy)*.004;tRX=Math.max(-1.3,Math.min(1.3,tRX));}
  const r=cv.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;
  tt.style.left=(e.clientX-r.left+14)+'px';tt.style.top=(e.clientY-r.top-10)+'px';
});
wr.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:.92;tZoom=Math.max(100,Math.min(600,tZoom*f));},{passive:false});
wr.addEventListener('click',e=>{
  if(dist>7)return;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(hitboxes);
  if(hits.length){const nd=curG.nodes.find(x=>x.id===hits[0].object.userData.nid);if(nd)openPanel(nd);}
  else closePanel();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')goBack();});

function resize(){
  const r=wr.getBoundingClientRect();
  renderer.setSize(r.width,r.height);camera.aspect=r.width/r.height;camera.updateProjectionMatrix();
}

function animate(){
  requestAnimationFrame(animate);t+=.012;
  rotX+=(tRX-rotX)*.08;rotY+=(tRY-rotY)*.08;al+=(tAl-al)*.12;zoom+=(tZoom-zoom)*.08;
  world.rotation.x=rotX;world.rotation.y=rotY;camera.position.z=zoom;
  rings.forEach((r,i)=>{r.rotation.y=t*(.65-i*.07);r.rotation.x=t*.22;});
  mats.forEach(m=>{m.opacity=m.userData.b*al;});
  bills.forEach(b=>b.lookAt(camera.position));
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(hitboxes);
  const nid=hits.length?hits[0].object.userData.nid:null;
  if(nid!==hovId){
    hovId=nid;wr.style.cursor=nid?'pointer':'';
    if(nid){
      const nd=curG.nodes.find(x=>x.id===nid);
      if(nd){document.getElementById('ttt').textContent=nd.cat;document.getElementById('ttl').textContent=nd.label;document.getElementById('tth').textContent=nd.children?'▶ entrar nesta rede':(nd.sub||'');tt.style.display='block';}
    }else tt.style.display='none';
  }
  renderer.render(scene,camera);
}

buildGraph(U);fitZoom(U.nodes);zoom=tZoom;updateChrome();resize();animate();
window.addEventListener('resize',resize);
</script>
</body>
</html>
